# /etc/logstash/conf.d/claude_analysis.conf
# ─────────────────────────────────────────────────────────────────────────────
# Logstash pipeline — receives Claude AI analysis events from Filebeat
# and forwards them to the wazuh-claude-* OpenSearch index.
#
# INSTALL:
#   sudo cp claude_analysis.conf /etc/logstash/conf.d/
#   sudo systemctl restart logstash
#
# This creates a NEW index (wazuh-claude-YYYY.MM.DD) separate from the main
# wazuh-alerts-* index so your Claude reports never pollute raw alert data.
# ─────────────────────────────────────────────────────────────────────────────

input {
  beats {
    port  => 5044          # default Filebeat → Logstash port
    codec => json_lines
  }
}

filter {
  # Only process events tagged as Claude analysis
  if "claude-analysis" in [tags] {

    # Ensure @timestamp is parsed correctly
    date {
      match   => ["@timestamp", "ISO8601"]
      target  => "@timestamp"
    }

    # Promote rule fields to top level for Wazuh dashboard compatibility
    # so filters like "rule.id: 999900" work out of the box
    mutate {
      add_field => {
        "[rule][id]"    => "%{[rule][id]}"
        "[rule][level]" => "%{[rule][level]}"
      }
    }

    # Convert rule.level to integer so range queries work
    mutate {
      convert => { "[rule][level]" => "integer" }
    }

    # Convert false_positive score to integer
    mutate {
      convert => { "[claude][false_positive_likelihood][score]" => "integer" }
    }

    # Remove Filebeat housekeeping fields to keep events clean
    mutate {
      remove_field => ["beat", "prospector", "offset", "input", "host", "log"]
    }
  }
}

output {
  if "claude-analysis" in [tags] {
    opensearch {
      hosts         => ["https://localhost:9200"]
      user          => "admin"
      password      => "${OPENSEARCH_PASSWORD}"   # set in /etc/logstash/logstash.keystore
      ssl           => true
      ssl_certificate_verification => false        # set true in production with valid cert

      # Daily rolling index — wazuh-claude-2026.03.23
      index         => "wazuh-claude-%{+YYYY.MM.dd}"

      # ILM / template (optional — remove if not using ILM)
      ilm_enabled              => false
      template_name            => "wazuh-claude"
      template_overwrite       => false
    }
  }
}
